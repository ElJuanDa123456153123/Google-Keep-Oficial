<!-- Topbar -->
<app-topbar (sidebarToggle)="onSidebarToggle()"></app-topbar>

<!-- Overlay para móvil (solo se muestra cuando sidebar está abierto) -->
@if (sidebarOpen) {
  <div class="app-overlay" (click)="sidebarOpen = false"></div>
}

<!-- Sidebar -->
<app-sidebar [isOpen]="sidebarOpen" (viewChange)="onViewChange($event)" (close)="sidebarOpen = false"></app-sidebar>

<!-- Main Content -->
<app-notes-board></app-notes-board>

<!-- FAB -->
<app-fab (click)="onFabClick()"></app-fab>

<!-- Note Modal -->
@if (showNoteModal) {
  <app-note-modal
    (close)="onNoteModalClose()"
    (noteCreated)="onNoteCreated()"
  ></app-note-modal>
}

<router-outlet />
