<!-- frontend/src/app/shared/components/reminder-modal/reminder-modal.component.html -->

<div class="reminder-overlay" (click)="onCancel()">
  <div class="reminder-modal" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="reminder-header">
      <span>Recordatorio</span>
      <button pButton icon="pi pi-times"
              class="p-button-text p-button-rounded close-btn"
              (click)="onCancel()">
      </button>
    </div>

    <!-- Selección de fecha y hora -->
    <div class="datetime-section">

      <!-- Visualización literal de la selección -->
      <div class="selected-display" *ngIf="selectedDate && selectedTime">
        <i class="pi pi-bell"></i>
        <span>{{ getSelectedDateTimeLiteral() }}</span>
      </div>

      <!-- Fecha -->
      <div class="field-group">
        <label>Fecha</label>
        <div class="input-wrapper">
          <i class="pi pi-calendar input-icon"></i>
          <input
            type="date"
            [(ngModel)]="selectedDate"
            [min]="minDate"
            class="datetime-input"
          />
        </div>
      </div>

      <!-- Hora -->
      <div class="field-group">
        <label>Hora</label>
        <div class="input-wrapper">
          <i class="pi pi-clock input-icon"></i>
          <input
            type="time"
            [(ngModel)]="selectedTime"
            class="datetime-input"
          />
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Sugerencias Inteligentes -->
    <div class="suggestions-section" *ngIf="quickSuggestions.length > 0">
      <div class="suggestions-title">Sugerencias rápidas</div>
      <div class="suggestions-list">
        <div
          *ngFor="let suggestion of quickSuggestions"
          class="suggestion-item"
          (click)="onSelectSuggestion(suggestion)"
        >
          <i [class]="suggestion.icon"></i>
          <span>{{ suggestion.label }}</span>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="error-section" *ngIf="errorMessage">
      <div class="error-msg">
        <i class="pi pi-exclamation-circle"></i>
        {{ errorMessage }}
      </div>
    </div>

    <!-- Footer -->
    <div class="reminder-footer">
      <button pButton label="Cancelar"
              class="p-button-text cancel-btn"
              (click)="onCancel()">
      </button>

      <div class="footer-right">
        <button *ngIf="existingReminder"
                pButton icon="pi pi-bell-slash"
                class="p-button-text clear-btn"
                title="Quitar recordatorio"
                (click)="onClear()">
        </button>
        <button pButton label="Guardar"
                class="p-button done-btn"
                [disabled]="!selectedDate || !selectedTime"
                (click)="onSave()">
        </button>
      </div>
    </div>

  </div>
</div>
