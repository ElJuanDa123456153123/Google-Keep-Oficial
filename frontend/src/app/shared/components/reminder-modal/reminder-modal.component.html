<!-- frontend/src/app/shared/components/reminder-modal/reminder-modal.component.html -->

<div class="reminder-overlay" (click)="onCancel()">
  <div class="reminder-modal" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="reminder-header">
      <span>Recordatorio</span>
      <button pButton icon="pi pi-times"
              class="p-button-text p-button-rounded close-btn"
              (click)="onCancel()">
      </button>
    </div>

    <!-- Opciones rápidas -->
    <div class="quick-options">
      <div class="quick-option" (click)="setQuick('today')">
        <i class="pi pi-sun"></i>
        <span>Hoy a las 9 AM</span>
      </div>
      <div class="quick-option" (click)="setQuick('tomorrow')">
        <i class="pi pi-arrow-right"></i>
        <span>Mañana a las 9 AM</span>
      </div>
      <div class="quick-option" (click)="setQuick('nextweek')">
        <i class="pi pi-calendar"></i>
        <span>Próxima semana a las 9 AM</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Personalizado -->
    <div class="custom-section">
      <div class="custom-title">Personalizado</div>

      <!-- Fecha -->
      <div class="field-group">
        <label>Fecha</label>
        <div class="input-wrapper">
          <i class="pi pi-calendar input-icon"></i>
          <input
            type="date"
            [(ngModel)]="customDate"
            [min]="today"
            class="custom-input"
          />
        </div>
      </div>

      <!-- Hora -->
      <div class="field-group">
        <label>Hora</label>
        <div class="input-wrapper">
          <i class="pi pi-clock input-icon"></i>
          <input
            type="time"
            [(ngModel)]="customTime"
            class="custom-input"
          />
        </div>
      </div>

      <!-- Error -->
      <div class="error-msg" *ngIf="errorMessage">
        <i class="pi pi-exclamation-circle"></i>
        {{ errorMessage }}
      </div>
    </div>

    <!-- Footer -->
    <div class="reminder-footer">
      <button pButton label="Cancelar"
              class="p-button-text cancel-btn"
              (click)="onCancel()">
      </button>

      <div class="footer-right">
        <button *ngIf="existingReminder"
                pButton icon="pi pi-bell-slash"
                class="p-button-text clear-btn"
                title="Quitar recordatorio"
                (click)="onClear()">
        </button>
        <button pButton label="Listo"
                class="p-button done-btn"
                (click)="onSaveCustom()">
        </button>
      </div>
    </div>

  </div>
</div>
