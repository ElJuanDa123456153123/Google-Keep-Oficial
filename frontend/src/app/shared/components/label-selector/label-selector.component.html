<div class="label-selector" (click)="$event.stopPropagation()">
  <!-- Selected Labels Chips -->
  <div class="selected-labels" *ngIf="selectedLabels.length > 0">
    <div class="label-chip" *ngFor="let label of selectedLabels">
      <span class="label-icon"></span>
      <span class="label-name">{{ label.name }}</span>
      <button class="remove-btn" (click)="removeLabel(label)" [disabled]="isCreatingLabel">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Search/Add Input -->
  <div class="search-container">
    <div class="search-input-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input
        type="text"
        class="search-input"
        placeholder="Add label"
        [value]="searchTerm"
        (input)="onSearchInput($event)"
        (focus)="toggleDropdown()"
        (keypress)="onKeyPress($event)"
        [disabled]="isCreatingLabel">
    </div>
  </div>

  <!-- Dropdown -->
  <div
    class="dropdown"
    *ngIf="isDropdownOpen"
    [class.is-open]="isDropdownOpen">
    <!-- Labels List -->
    <div class="labels-list" *ngIf="filteredLabels.length > 0 || !showCreateOption">
      <div
        class="label-option"
        *ngFor="let label of filteredLabels"
        [class.selected]="isLabelSelected(label)"
        (click)="toggleLabel(label)">
        <svg class="checkbox-icon" viewBox="0 0 24 24" fill="currentColor">
          <path *ngIf="isLabelSelected(label)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          <path *ngIf="!isLabelSelected(label)" d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
        </svg>
        <span class="label-option-name">{{ label.name }}</span>
      </div>
    </div>

    <!-- No Results Message -->
    <div class="no-results" *ngIf="filteredLabels.length === 0 && !showCreateOption">
      <span>No labels found</span>
    </div>

    <!-- Create New Label Option -->
    <div
      class="create-option"
      *ngIf="showCreateOption"
      (click)="createNewLabel()">
      <svg class="create-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
      </svg>
      <span class="create-text">Create "{{ searchTerm }}"</span>
      <span class="loading-spinner" *ngIf="isCreatingLabel"></span>
    </div>
  </div>
</div>
