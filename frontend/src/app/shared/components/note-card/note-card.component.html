<div class="note-card" (click)="onCardClick()">

  <!-- Botones para vista normal -->
  <ng-container *ngIf="!isTrashView">
    <!-- Botón X eliminar -->
    <button class="delete-btn" title="Eliminar nota" (click)="onDeleteClick($event)">
      <i class="pi pi-times"></i>
    </button>

    <!-- Pin indicator -->
    <div class="pin-icon" *ngIf="note.is_pinned" (click)="onPinClick($event)">
      <i class="pi pi-pushpin"></i>
    </div>

    <!-- ✅ NUEVO: Botón de etiquetas -->
    <button class="label-btn" title="Editar etiquetas" (click)="onLabelClick($event)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7v10c0 1.1.9 1.99 2 1.99L16 19c.67 0 1.27-.33 1.63-.84L22 12l-4.37-6.16z"/>
      </svg>
    </button>
  </ng-container>

  <!-- Botones para vista de papelera -->
  <ng-container *ngIf="isTrashView">
    <div class="trash-actions">
      <button class="restore-btn" title="Restaurar nota" (click)="onRestoreClick($event)">
        <i class="pi pi-refresh"></i>
      </button>
      <button class="permanent-delete-btn" title="Eliminar permanentemente" (click)="onPermanentDeleteClick($event)">
        <i class="pi pi-trash"></i>
      </button>
    </div>
  </ng-container>

  <!-- Image -->
  <div class="note-image" *ngIf="note.image_url">
    <img [src]="note.image_url" [alt]="note.title || 'Nota'" />
  </div>

  <!-- Title -->
  <h3 class="note-title" *ngIf="note.title">{{ note.title }}</h3>

  <!-- Content -->
  <div class="note-content" *ngIf="note.content && !note.checklist_items?.length">
    <p>{{ note.content }}</p>
  </div>

  <!-- Checklist -->
  <div class="note-checklist" *ngIf="note.checklist_items && note.checklist_items.length > 0">
    <div *ngFor="let item of note.checklist_items" class="checklist-item" [class.completed]="item.is_checked">
      <input
        type="checkbox"
        class="checklist-checkbox"
        [checked]="item.is_checked"
        (click)="$event.stopPropagation()"
        (change)="onToggleCheckItem(item.id)"
      />
      <span class="item-text">{{ item.content }}</span>
    </div>
    <div class="completed-count" *ngIf="getCompletedCount() > 0">
      <span class="count">{{ getCompletedCount() }}</span>
      <span> de {{ getTotalCount() }} completados</span>
    </div>
  </div>

  <!-- Reminder -->
  <div class="note-reminder" [class.soon]="isReminderSoon()" *ngIf="note.reminder_date">
    <i class="pi pi-bell"></i>
    <span>{{ formatReminderCountdown(note.reminder_date) }}</span>
  </div>

  <!-- ✅ NUEVO: Labels -->
  <div class="note-labels" *ngIf="note.labels && note.labels.length > 0">
    <div class="label-chip" *ngFor="let label of note.labels">
      <span class="label-icon"></span>
      <span class="label-name">{{ label.name }}</span>
    </div>
  </div>

  <!-- Collaborators -->
  <div class="note-collaborators" *ngIf="note.collaborators && note.collaborators.length > 0">
    <p-avatar
      *ngFor="let collab of note.collaborators.slice(0, 3)"
      [label]="(collab.user?.name?.substring(0, 2)?.toUpperCase() || '??')"
      [title]="collab.user?.name || 'Colaborador'"
      size="normal" shape="circle" styleClass="p-accent"
    ></p-avatar>
    <span class="more-collaborators" *ngIf="note.collaborators.length > 3">
      +{{ note.collaborators.length - 3 }}
    </span>
  </div>

</div>
