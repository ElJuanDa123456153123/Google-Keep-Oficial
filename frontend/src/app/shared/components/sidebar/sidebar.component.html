<!-- Overlay para móvil -->
@if (isOpen) {
  <div class="sidebar-overlay" (click)="onClose()"></div>
}

<aside class="sidebar" [class.open]="isOpen">
  <!-- Botón cerrar solo visible en móvil -->
  <button class="sidebar-close" pButton icon="pi pi-times" (click)="onClose()"></button>

  <nav class="sidebar-nav">
    <!-- Main Menu Items -->
    <div class="menu-section">
      @for (item of mainItems; track item.label) {
        <button
          pButton
          [icon]="item.icon"
          [label]="item.label"
          [class.active]="item.active"
          class="menu-item p-button-text"
          (click)="onMainItemClick(item)"
        ></button>
      }
    </div>

    <!-- Labels Section -->
    @if (labelsLoaded) {
      <div class="menu-section labels-section">
        <div class="section-header">ETIQUETAS</div>
        @for (label of labels; track label.id) {
          <button
            pButton
            icon="pi pi-tag"
            [label]="label.name"
            class="menu-item label-item p-button-text"
            (click)="onLabelClick(label)"
          ></button>
        }
        <button
          pButton
          icon="pi pi-plus"
          label="Nueva etiqueta"
          class="menu-item add-label p-button-text"
          (click)="addNewLabel()"
        ></button>
      </div>
    }

    <!-- Trash -->
    <div class="menu-section trash-section">
      <button
        pButton
        icon="pi pi-trash"
        label="Papelera"
        class="menu-item p-button-text"
        (click)="onTrashClick()"
      ></button>
    </div>
  </nav>

  <!-- Label Modal -->
  @if (showLabelModal) {
    <app-label-modal
      (close)="onLabelModalClose()"
      (labelCreated)="onLabelCreated()"
    ></app-label-modal>
  }
</aside>
