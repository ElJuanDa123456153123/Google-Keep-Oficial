<header class="topbar">
  <div class="topbar-left">
    <button pButton icon="pi pi-bars" class="p-button-text p-button-rounded" (click)="toggleSidebar()"></button>
    <div class="logo">
      <i class="pi pi-google" style="color: #fbbc04;"></i>
      <span class="keep-logo">K</span>
      <span class="keep-text">Keep</span>
    </div>
  </div>

  <div class="topbar-center">
    <input
      type="text"
      name="searchQuery"
      class="search-input"
      placeholder="Buscar en Keep"
      [(ngModel)]="searchQuery"
      (keyup.enter)="onSearch()"
    />
    <i class="pi pi-search search-icon" *ngIf="showSearchIcon"></i>
  </div>

  <div class="topbar-right">
    <button pButton icon="pi pi-th-large" class="p-button-text p-button-rounded" title="Vista"></button>
    <button pButton icon="pi pi-cog" class="p-button-text p-button-rounded" (click)="openSettings()" title="Configuración"></button>
    
    <!-- Profile Container -->
    <div class="profile-container" style="position: relative; margin-left: 8px; cursor: pointer;">
      <p-avatar [label]="userInitials" class="p-accent" size="normal" shape="circle" (click)="toggleProfileMenu($event)"></p-avatar>

      <!-- Dropdown Menu -->
      <div class="profile-dropdown" *ngIf="showProfileMenu">
        <div class="profile-header">
          <p-avatar [label]="userInitials" class="p-accent" size="xlarge" shape="circle"></p-avatar>
          <div class="profile-info">
            <span class="profile-name">{{ userProfile?.name || 'Usuario' }}</span>
            <span class="profile-email">{{ userProfile?.email || 'Sin correo' }}</span>
          </div>
        </div>
        <div class="profile-divider"></div>
        <div class="profile-actions">
          <button class="logout-btn" (click)="logout()">
            <i class="pi pi-sign-out"></i>
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
