<div class="modal-overlay" [@overlayAnim] (click)="onOutsideClick($event)">
  <div class="note-modal" [@modalAnim] [ngClass]="getModalColorClass()">

    <!-- Header: X eliminar (solo en modo edición) + pin -->
    <div class="modal-header">
      <button
        pButton
        icon="pi pi-times"
        class="p-button-text p-button-rounded header-btn"
        title="Cerrar"
        (click)="onClose()"
      ></button>
      <button
        pButton
        icon="pi pi-pushpin"
        [ngClass]="{'pinned': noteData.is_pinned}"
        class="p-button-text p-button-rounded header-btn pin-btn"
        (click)="onTogglePin()"
      ></button>
    </div>

    <!-- Title Input (siempre visible) -->
    <input
      type="text"
      name="title"
      class="note-title-input"
      placeholder="Título"
      [(ngModel)]="noteData.title"
      (keydown.enter)="$event.preventDefault()"
    />

    <!-- Image Upload Area -->
    <div *ngIf="showImageUpload" class="image-upload-area">
      <input
        type="file"
        accept="image/*"
        (change)="onImageSelected($event)"
        class="image-input"
        #imageInput
      />
      <div *ngIf="!imagePreview" class="image-upload-placeholder" (click)="imageInput.click()">
        <i class="pi pi-image"></i>
        <span>Añadir imagen</span>
      </div>
      <div *ngIf="imagePreview" class="image-preview-container">
        <img [src]="imagePreview" class="image-preview" alt="Preview" />
        <button
          pButton
          icon="pi pi-times"
          class="p-button-text p-button-rounded remove-image-btn"
          (click)="removeImage()"
        ></button>
      </div>
    </div>

    <!-- Content Textarea -->
    <textarea
      *ngIf="!isChecklistMode"
      name="content"
      class="note-content-input"
      placeholder="Toma una nota..."
      [(ngModel)]="noteData.content"
      rows="4"
    ></textarea>

    <!-- Checklist Items -->
    <div *ngIf="isChecklistMode" class="checklist-items">
      <div
        *ngFor="let item of checklistItems; let i = index"
        class="checklist-item-row"
      >
        <input
          type="checkbox"
          [checked]="item.is_checked"
          (change)="onChecklistItemCheckChange(i, $any($event.target).checked)"
          class="checklist-checkbox"
        />
        <input
          type="text"
          name="checklist-content-{{i}}"
          class="checklist-item-input"
          placeholder="Elemento de lista"
          [(ngModel)]="item.content"
        />
        <button
          *ngIf="checklistItems.length > 1"
          pButton
          icon="pi pi-times"
          class="p-button-text p-button-rounded remove-item-btn"
          (click)="removeChecklistItem(i)"
        ></button>
      </div>
      <button
        pButton
        class="p-button-text add-item-btn"
        (click)="addChecklistItem()"
      >
        + Añadir elemento
      </button>
    </div>

    <!-- Bottom Toolbar: orden Checklist, Imagen, Colores, Colaboradores, Recordatorios -->
    <div class="modal-toolbar">
      <div class="toolbar-left">

        <!-- 1. Checklist -->
        <button
          pButton
          [icon]="isChecklistMode ? 'pi pi-check-square' : 'pi pi-list-check'"
          class="p-button-text p-button-rounded toolbar-icon-btn"
          [ngClass]="{'active-btn': isChecklistMode}"
          title="Lista de verificación"
          (click)="onToggleChecklist()"
        ></button>

        <!-- 2. Imagen -->
        <button
          pButton
          icon="pi pi-image"
          class="p-button-text p-button-rounded toolbar-icon-btn"
          title="Imagen"
          (click)="onToggleImageUpload()"
        ></button>

        <!-- 3. Colores -->
        <div class="color-picker-wrapper">
          <button
            pButton
            icon="pi pi-palette"
            class="p-button-text p-button-rounded toolbar-icon-btn"
            title="Color de fondo"
            (click)="onToggleColorPicker($event)"
          ></button>
          <div *ngIf="showColorPicker" class="color-picker-popup">
            <div class="color-header">Color de fondo</div>
            <div class="color-grid">
              <div
                *ngFor="let color of colors"
                class="color-item"
                [ngClass]="color.class"
                (click)="onColorSelect(color.name)"
                [title]="color.name"
              ></div>
            </div>
          </div>
        </div>

        <!-- 4. Colaboradores -->
        <div class="collaborator-wrapper">
          <button
            pButton
            icon="pi pi-user-plus"
            class="p-button-text p-button-rounded toolbar-icon-btn"
            title="Colaborar"
            (click)="onToggleCollaborators()"
          ></button>
          <div *ngIf="showCollaborators" class="collaborator-popup">
            <div class="popup-header">Colaborador</div>
            <div class="popup-option" (click)="addCollaborator()">
              <i class="pi pi-user"></i>
              <span>Invitar a personas</span>
            </div>
            <div class="popup-option">
              <i class="pi pi-users"></i>
              <span>Ver grupos</span>
            </div>
          </div>
        </div>

        <!-- 5. Recordatorios -->
        <div class="reminder-wrapper">
          <button
            pButton
            icon="pi pi-bell"
            class="p-button-text p-button-rounded toolbar-icon-btn"
            title="Recordatorio"
            (click)="onToggleReminder()"
          ></button>
          <div *ngIf="showReminder" class="reminder-popup">
            <div class="popup-header">Recordatorio</div>
            <div class="popup-option" (click)="setReminder('tomorrow')">
              <i class="pi pi-clock"></i>
              <span>Mañana a las 8:00</span>
            </div>
            <div class="popup-option" (click)="setReminder('nextweek')">
              <i class="pi pi-calendar"></i>
              <span>Próxima semana</span>
            </div>
            <div class="popup-option" (click)="setReminder('custom')">
              <i class="pi pi-calendar-plus"></i>
              <span>Personalizado</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Botones Cancelar y Listo -->
      <div class="toolbar-right">
        <button
          pButton
          label="Cancelar"
          class="p-button-text cancel-btn"
          (click)="onClose()"
        ></button>
        <button
          pButton
          label="Listo"
          class="p-button-text done-btn"
          [disabled]="isCreating"
          (click)="onSave()"
        ></button>
      </div>
    </div>

  </div>
</div>
