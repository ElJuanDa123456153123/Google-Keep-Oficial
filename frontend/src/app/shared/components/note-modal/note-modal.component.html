<div class="modal-overlay" [@overlayAnim] (click)="onOutsideClick($event)">
  <div class="note-modal" [@modalAnim] [ngClass]="getModalColorClass()">

    <!-- Header -->
    <div class="modal-header">
      <button
        pButton
        icon="pi pi-times"
        class="p-button-text p-button-rounded header-btn"
        title="Cerrar"
        (click)="onClose()"
      ></button>
      <button
        pButton
        icon="pi pi-pushpin"
        [ngClass]="{'pinned': noteData.is_pinned}"
        class="p-button-text p-button-rounded header-btn pin-btn"
        (click)="onTogglePin()"
      ></button>
    </div>

    <!-- Title -->
    <input
      type="text"
      name="title"
      class="note-title-input"
      placeholder="Título"
      [(ngModel)]="noteData.title"
      (keydown.enter)="$event.preventDefault()"
    />

    <!-- Image Upload -->
    <div *ngIf="showImageUpload" class="image-upload-area">
      <input
        type="file"
        accept="image/*"
        (change)="onImageSelected($event)"
        class="image-input"
        #imageInput
      />
      <div *ngIf="!imagePreview" class="image-upload-placeholder" (click)="imageInput.click()">
        <i class="pi pi-image"></i>
        <span>Añadir imagen</span>
      </div>
      <div *ngIf="imagePreview" class="image-preview-container">
        <img [src]="imagePreview" class="image-preview" alt="Preview" />
        <button
          pButton
          icon="pi pi-times"
          class="p-button-text p-button-rounded remove-image-btn"
          (click)="removeImage()"
        ></button>
      </div>
    </div>

    <!-- Content Textarea -->
    <textarea
      *ngIf="!isChecklistMode"
      name="content"
      class="note-content-input"
      placeholder="Toma una nota..."
      [(ngModel)]="noteData.content"
      rows="4"
    ></textarea>

    <!-- Checklist Items -->
    <div *ngIf="isChecklistMode" class="checklist-items" (click)="$event.stopPropagation()">
      <div
        *ngFor="let item of checklistItems; let i = index"
        class="checklist-item-row"
      >
        <input
          type="checkbox"
          [checked]="item.is_checked"
          (change)="onChecklistItemCheckChange(i, $any($event.target).checked)"
          (click)="$event.stopPropagation()"
          class="checklist-checkbox"
        />
        <input
          type="text"
          name="checklist-content-{{i}}"
          class="checklist-item-input"
          placeholder="Elemento de lista"
          [(ngModel)]="item.content"
          (click)="$event.stopPropagation()"
        />
        <button
          *ngIf="checklistItems.length > 1"
          pButton
          icon="pi pi-times"
          class="p-button-text p-button-rounded remove-item-btn"
          (click)="$event.stopPropagation(); removeChecklistItem(i)"
        ></button>
      </div>
      <button
        pButton
        class="p-button-text add-item-btn"
        (click)="$event.stopPropagation(); addChecklistItem()"
      >
        + Añadir elemento
      </button>
    </div>

    <!-- Chip de recordatorio activo -->
    <div *ngIf="reminderDate" class="reminder-chip" (click)="onToggleReminder()">
      <i class="pi pi-bell"></i>
      <span>{{ getReminderChipLabel() }}</span>
      <button
        class="chip-remove"
        (click)="$event.stopPropagation(); onReminderCleared()"
        title="Quitar recordatorio"
      >
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- ✅ NUEVO: chips de colaboradores activos (visibles dentro del modal) -->
    <div class="collaborator-chips" *ngIf="noteCollaborators.length > 0">
      <div
        class="collab-chip"
        *ngFor="let collab of noteCollaborators"
        [title]="collab.user?.name || 'Colaborador'"
      >
        <span class="chip-avatar">{{ getCollaboratorInitials(collab) }}</span>
        <span class="chip-name">{{ collab.user?.name || collab.user?.email }}</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="modal-toolbar">
      <div class="toolbar-left">

        <button
          pButton
          [icon]="isChecklistMode ? 'pi pi-check-square' : 'pi pi-list-check'"
          class="p-button-text p-button-rounded toolbar-icon-btn"
          [ngClass]="{'active-btn': isChecklistMode}"
          title="Lista de verificación"
          (click)="onToggleChecklist()"
        ></button>

        <button
          pButton
          icon="pi pi-image"
          class="p-button-text p-button-rounded toolbar-icon-btn"
          title="Imagen"
          (click)="onToggleImageUpload()"
        ></button>

        <div class="color-picker-wrapper">
          <button
            pButton
            icon="pi pi-palette"
            class="p-button-text p-button-rounded toolbar-icon-btn"
            title="Color de fondo"
            (click)="onToggleColorPicker($event)"
          ></button>
          <div *ngIf="showColorPicker" class="color-picker-popup">
            <div class="color-header">Color de fondo</div>
            <div class="color-grid">
              <div
                *ngFor="let color of colors"
                class="color-item"
                [ngClass]="color.class"
                (click)="onColorSelect(color.name)"
                [title]="color.name"
              ></div>
            </div>
          </div>
        </div>

        <!-- ✅ ACTUALIZADO: botón colaboradores con badge cuando hay colaboradores -->
        <div class="collaborator-wrapper">
          <button
            pButton
            icon="pi pi-user-plus"
            class="p-button-text p-button-rounded toolbar-icon-btn"
            [ngClass]="{'active-btn': noteCollaborators.length > 0}"
            title="Colaborar"
            (click)="onToggleCollaborators()"
          >
          </button>
          <!-- Badge con número de colaboradores -->
          <span
            class="collab-badge"
            *ngIf="noteCollaborators.length > 0"
          >{{ noteCollaborators.length }}</span>
        </div>

        <!-- Botón recordatorio — activo si hay fecha -->
        <button
          pButton
          icon="pi pi-bell"
          class="p-button-text p-button-rounded toolbar-icon-btn"
          [ngClass]="{'active-btn': reminderDate}"
          title="Recordatorio"
          (click)="onToggleReminder()"
        ></button>

      </div>

      <div class="toolbar-right">
        <button
          pButton
          label="Cancelar"
          class="p-button-text cancel-btn"
          (click)="onClose()"
        ></button>
        <button
          pButton
          label="Listo"
          class="p-button-text done-btn"
          [disabled]="isCreating"
          (click)="onSave(); $event.stopPropagation()"
        ></button>
      </div>
    </div>

  </div>
</div>

<!-- Modal de recordatorio — fuera del note-modal para evitar z-index issues -->
<app-reminder-modal
  *ngIf="showReminderModal"
  [existingReminder]="reminderDate"
  (reminderSaved)="onReminderSaved($event)"
  (reminderCleared)="onReminderCleared()"
  (cancelled)="onReminderCancelled()"
></app-reminder-modal>

<!-- ✅ NUEVO: Modal de colaboradores — fuera del note-modal, mismo patrón que reminder-modal -->
<app-collaborator-modal
  *ngIf="showCollaborators && editNote?.id"
  [noteId]="editNote!.id"
  [initialCollaborators]="noteCollaborators"
  (closed)="onCollaboratorsClosed($event)"
></app-collaborator-modal>
